<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinHub Master Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f5f7ff;color:#1e1b4b;min-height:100vh}
    :root{--p:#7c3aed;--g:#059669;--r:#e11d48;--y:#d97706;--b:#2563eb;--t:#0891b2;--border:#e0e5f2;--muted:#64748b}
    a{text-decoration:none;color:inherit}

    #loginScreen{position:fixed;inset:0;background:#000000;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
    #loginScreen.hidden{display:none}
    .login-box{background:#fff;border:2px solid #e0e5f2;border-radius:24px;padding:44px 36px;width:100%;max-width:400px;text-align:center;box-shadow:0 16px 48px rgba(124,58,237,.12)}
    .login-logo{margin-bottom:28px}
    .login-logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
    .login-logo-icon svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2}
    .login-logo h1{font-size:22px;font-weight:900;letter-spacing:-.5px;color:#1e1b4b}
    .login-logo p{font-size:13px;color:#64748b;margin-top:4px}
    .login-field{margin-bottom:14px;text-align:left}
    .login-field label{display:block;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
    .login-field input{width:100%;background:#f5f7ff;border:2px solid #e0e5f2;border-radius:10px;padding:14px;color:#1e1b4b;font-size:15px;font-family:inherit}
    .login-field input:focus{outline:none;border-color:#7c3aed;background:#fff}
    .login-btn{width:100%;padding:16px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-weight:800;font-size:16px;border:none;cursor:pointer;font-family:inherit;margin-top:4px;transition:all .2s}
    .login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(124,58,237,.3)}
    .login-error{background:rgba(225,29,72,.07);border:1.5px solid rgba(225,29,72,.25);border-radius:8px;padding:10px;font-size:13px;color:#e11d48;margin-bottom:12px;display:none}
    .login-error.show{display:block}
    .back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#64748b;margin-top:20px;cursor:pointer}
    .back-link:hover{color:#7c3aed}
    .back-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}

    #dashboard{display:none}
    #dashboard.show{display:block}
    header{background:rgba(255,255,255,.97);border-bottom:1.5px solid #e0e5f2;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);box-shadow:0 2px 12px rgba(0,0,0,.05)}
    .h-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:900;color:#1e1b4b}
    .h-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:8px;display:flex;align-items:center;justify-content:center}
    .h-logo-icon svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5}
    .h-right{display:flex;align-items:center;gap:12px}
    .h-badge{background:rgba(124,58,237,.1);border:1.5px solid rgba(124,58,237,.25);color:#7c3aed;padding:7px 16px;border-radius:999px;font-size:12px;font-weight:700}
    .h-logout{background:#fff;border:1.5px solid #e0e5f2;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;color:#64748b;cursor:pointer;font-family:inherit;transition:all .2s}
    .h-logout:hover{color:#e11d48;border-color:#e11d48}
    .back-home{display:flex;align-items:center;gap:6px;font-size:13px;color:#64748b;background:#fff;border:1.5px solid #e0e5f2;border-radius:8px;padding:8px 16px;cursor:pointer;font-family:inherit;transition:all .2s;text-decoration:none}
    .back-home:hover{color:#7c3aed;border-color:#7c3aed}
    .back-home svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}

    .page{max-width:1300px;margin:0 auto;padding:24px 20px 60px}

    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
    .stat-card{background:#fff;border:1.5px solid #e0e5f2;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .stat-val{font-size:28px;font-weight:900;font-family:monospace}
    .stat-lbl{font-size:12px;color:#64748b;margin-top:3px}

    .filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:20px;padding:14px 16px;background:#fff;border:1.5px solid #e0e5f2;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.03)}
    .filter-row h2{font-size:16px;font-weight:800;margin-right:4px;color:#1e1b4b}
    .ftab{padding:9px 18px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid #e0e5f2;background:#f5f7ff;color:#64748b;font-family:inherit;transition:all .2s}
    .ftab:hover{border-color:#c4b5fd;color:#7c3aed}
    .ftab.f-amateur.active{background:rgba(5,150,105,.08);border-color:#059669;color:#059669}
    .ftab.f-teacher.active{background:rgba(217,119,6,.08);border-color:#d97706;color:#d97706}
    .ftab.f-school.active{background:rgba(8,145,178,.08);border-color:#0891b2;color:#0891b2}
    .ftab.active{background:rgba(124,58,237,.08);border-color:#7c3aed;color:#7c3aed}
    .sort-btn{margin-left:auto;padding:9px 16px;border-radius:8px;border:1.5px solid #e0e5f2;background:#f5f7ff;color:#64748b;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
    .sort-btn:hover{color:#7c3aed;border-color:#7c3aed}
    .sort-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
    .search-box{padding:9px 14px;border-radius:10px;border:1.5px solid #e0e5f2;background:#f5f7ff;color:#1e1b4b;font-size:13px;font-family:inherit;width:200px}
    .search-box:focus{outline:none;border-color:#7c3aed;background:#fff}

    .user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
    .no-users{text-align:center;padding:60px 20px;color:#64748b;font-size:15px;background:#fff;border-radius:14px;border:1.5px solid #e0e5f2}
    .user-card{background:#fff;border:1.5px solid #e0e5f2;border-radius:16px;padding:20px;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .user-card:hover{border-color:#c4b5fd;box-shadow:0 8px 24px rgba(124,58,237,.1);transform:translateY(-2px)}
    .user-card.frozen-card{opacity:.6;border-style:dashed}
    .uc-top{display:flex;flex-direction:column;align-items:center;margin-bottom:14px}
    .uc-photo-wrap{position:relative;width:68px;height:68px;margin-bottom:10px}
    .uc-photo{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#0891b2);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;overflow:hidden}
    .uc-photo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .online-dot{position:absolute;bottom:3px;right:3px;width:14px;height:14px;border-radius:50%;background:#059669;border:2px solid #fff;box-shadow:0 0 6px rgba(5,150,105,.5)}
    .uc-name{font-weight:800;font-size:15px;text-align:center;color:#1e1b4b}
    .uc-username{font-size:12px;color:#64748b;margin-top:2px}
    .uc-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:6px}
    .badge-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px}
    .badge-student{background:rgba(124,58,237,.1);color:#7c3aed}
    .badge-teacher{background:rgba(217,119,6,.1);color:#d97706}
    .badge-amateur{background:rgba(5,150,105,.1);color:#059669}
    .badge-school-prog{background:rgba(8,145,178,.1);color:#0891b2}
    .badge-frozen{background:rgba(225,29,72,.1);color:#e11d48}
    .uc-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
    .uc-stat{background:#f5f7ff;border:1.5px solid #e0e5f2;border-radius:8px;padding:8px;text-align:center}
    .uc-stat-val{font-size:12px;font-weight:800;font-family:monospace;color:#1e1b4b}
    .uc-stat-lbl{font-size:10px;color:#64748b;margin-top:1px}
    .uc-rank{font-size:12px;color:#64748b;text-align:center;margin-bottom:10px}
    .uc-rank strong{color:#1e1b4b}
    .uc-school{font-size:11px;color:#64748b;text-align:center;margin-bottom:10px;font-style:italic}
    .uc-actions{display:flex;gap:7px}
    .uc-btn{flex:1;padding:9px 6px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
    .uc-freeze{background:rgba(217,119,6,.08);color:#d97706;border:1.5px solid rgba(217,119,6,.3)}
    .uc-freeze:hover{background:rgba(217,119,6,.16)}
    .uc-unfreeze{background:rgba(5,150,105,.08);color:#059669;border:1.5px solid rgba(5,150,105,.3)}
    .uc-unfreeze:hover{background:rgba(5,150,105,.16)}
    .uc-delete{background:rgba(225,29,72,.07);color:#e11d48;border:1.5px solid rgba(225,29,72,.25)}
    .uc-delete:hover{background:rgba(225,29,72,.14)}
    .uc-details{font-size:12px;background:#f5f7ff;color:#64748b;border:1.5px solid #e0e5f2}
    .uc-details:hover{color:#7c3aed;border-color:#c4b5fd}

    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
    .modal-bg.show{display:flex}
    .modal{background:#fff;border:1.5px solid #e0e5f2;border-radius:18px;padding:28px;width:100%;max-width:420px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
    .modal h3{font-size:18px;font-weight:800;margin-bottom:16px;color:#1e1b4b}
    .detail-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f4ff;font-size:13px}
    .detail-row:last-child{border-bottom:none}
    .detail-label{color:#64748b}
    .detail-val{font-weight:700;font-family:monospace;color:#1e1b4b}
    .modal-close{width:100%;margin-top:16px;padding:12px;border-radius:10px;background:#f5f7ff;border:1.5px solid #e0e5f2;color:#64748b;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    .modal-close:hover{color:#7c3aed;border-color:#7c3aed}

    @media(max-width:700px){.stats-bar{grid-template-columns:repeat(2,1fr)}.filter-row{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <h1>Master Dashboard</h1>
      <p>Administrator access only</p>
    </div>
    <div class="login-error" id="masterErr"></div>
    <div class="login-field"><label>Username</label><input id="masterUser" type="text" placeholder="finhub.shikha"/></div>
    <div class="login-field"><label>Password</label><input id="masterPass" type="password" placeholder="••••••••••"/></div>
    <button class="login-btn" onclick="masterLogin()">Sign In to Dashboard</button>
    <div><a class="back-link" href="index.html"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Back to FinHub</a></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <header>
    <div class="h-logo">
      <div class="h-logo-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      Master Dashboard
    </div>
    <div class="h-right">
      <div class="h-badge">Admin: finhub.shikha</div>
      <a href="index.html" class="back-home"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
      <button class="h-logout" onclick="masterLogout()">Logout</button>
    </div>
  </header>

  <div class="page">
    <div class="stats-bar" id="statsBar"></div>

    <div class="filter-row">
      <h2>All Accounts</h2>
      <button class="ftab active" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="ftab f-amateur" data-filter="amateur" onclick="setFilter('amateur',this)">Self-Learners</button>
      <div id="schoolTabs" style="display:contents"></div>
      <input class="search-box" type="text" placeholder="Search name or username..." oninput="renderUsers()" id="searchBox"/>
      <button class="sort-btn" onclick="toggleSort()">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span id="sortLabel">A–Z</span>
      </button>
    </div>

    <div class="user-grid" id="userGrid"></div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <h3 id="modalTitle">User Details</h3>
    <div id="modalBody"></div>
    <button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('show')">Close</button>
  </div>
</div>

<script>
const UK = 'finhub_users', MASTER_USER = 'finhub.shikha', MASTER_PASS = 'finhub.12345';
function getUsers(){return JSON.parse(localStorage.getItem(UK)||'{}')}
function saveUsers(u){localStorage.setItem(UK,JSON.stringify(u))}

let masterLoggedIn = false;
let curFilter = 'all';
let sortAZ = true;

function masterLogin() {
  const u = document.getElementById('masterUser').value.trim();
  const p = document.getElementById('masterPass').value;
  const err = document.getElementById('masterErr');
  if (u === MASTER_USER && p === MASTER_PASS) {
    masterLoggedIn = true;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.add('show');
    buildSchoolTabs();
    renderStats();
    renderUsers();
    setInterval(renderUsers, 15000); // refresh online status
  } else {
    err.textContent = 'Incorrect credentials. Please try again.';
    err.classList.add('show');
  }
}
function masterLogout() { masterLoggedIn=false; document.getElementById('loginScreen').classList.remove('hidden'); document.getElementById('dashboard').classList.remove('show'); }
document.getElementById('masterPass').addEventListener('keydown',e=>{if(e.key==='Enter')masterLogin()});

function buildSchoolTabs() {
  const users = getUsers();
  // Collect schools from students (level=school) AND teachers who have a school set
  const allVals = Object.values(users);
  const schoolKeys = [...new Set([
    ...allVals.filter(u=>u.type==='student'&&u.level==='school'&&u.school).map(u=>u.school.toLowerCase().trim()),
    ...allVals.filter(u=>u.type==='teacher'&&u.school).map(u=>u.school.toLowerCase().trim()),
  ])].filter(Boolean);
  const container = document.getElementById('schoolTabs');
  container.innerHTML = schoolKeys.map(sk => {
    const displayName = allVals.find(u=>u.school&&u.school.toLowerCase().trim()===sk)?.school || sk;
    return `<button class="ftab f-school" data-filter="school:${sk}" onclick="setFilter('school:${sk}',this)">${displayName}</button>`;
  }).join('');
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderUsers();
}

function toggleSort() { sortAZ=!sortAZ; document.getElementById('sortLabel').textContent=sortAZ?'A–Z':'Z–A'; renderUsers(); }

function renderStats() {
  const users = getUsers();
  const all = Object.values(users);
  const students = all.filter(u=>u.type==='student');
  const teachers = all.filter(u=>u.type==='teacher');
  const online = all.filter(u=>Date.now()-u.lastActive<120000).length;
  document.getElementById('statsBar').innerHTML = [
    {lbl:'Total Users',val:all.length,c:'var(--p)'},
    {lbl:'Students',val:students.length,c:'var(--b)'},
    {lbl:'Teachers',val:teachers.length,c:'var(--y)'},
    {lbl:'Online Now',val:online,c:'var(--g)'},
  ].map(s=>`<div class="stat-card"><div class="stat-val" style="color:${s.c}">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('');
}

function renderUsers() {
  const users = getUsers();
  const query = (document.getElementById('searchBox')?.value||'').toLowerCase().trim();
  let list = Object.values(users);

  // Filter — All → Self-Learners → Schools (students + teachers per school)
  if (curFilter === 'amateur') list = list.filter(u=>u.type==='student'&&u.level==='amateur');
  else if (curFilter.startsWith('school:')) {
    const sk = curFilter.replace('school:','');
    list = list.filter(u=>u.school&&u.school.toLowerCase().trim()===sk);
  }

  // Search
  if (query) list = list.filter(u=>(u.name||'').toLowerCase().includes(query)||(u.username||'').toLowerCase().includes(query));

  // Sort A-Z or Z-A
  list.sort((a,b)=>sortAZ?a.name.localeCompare(b.name):b.name.localeCompare(a.name));

  // Rank by game avg
  const ranked = [...list].sort((a,b)=>(b.gameAvg||0)-(a.gameAvg||0));
  const rankMap = {};
  ranked.forEach((u,i)=>rankMap[u.username]=i+1);

  const grid = document.getElementById('userGrid');
  if (!list.length) { grid.innerHTML='<div class="no-users">No accounts found in this category.</div>'; renderStats(); return; }

  const isOnline = u => Date.now() - (u.lastActive||0) < 120000;

  grid.innerHTML = list.map(u => {
    const online = isOnline(u);
    const avg = u.gameHistory && u.gameHistory.length > 0 ? Math.round(u.gameHistory.reduce((a,b)=>a+b,0)/u.gameHistory.length) : 0;
    const realVal = u.realPortfolioValue || 50000;
    const photoHtml = u.photo ? `<img src="${u.photo}" alt=""/>` : `<span>${(u.name||'U').charAt(0).toUpperCase()}</span>`;
    let badges = `<span class="badge-pill badge-${u.type}">${u.type.charAt(0).toUpperCase()+u.type.slice(1)}</span>`;
    if (u.type==='student') badges += ` <span class="badge-pill ${u.level==='school'?'badge-school-prog':'badge-amateur'}">${u.level==='school'?'School':'Self-Learner'}</span>`;
    if (u.frozen) badges += ` <span class="badge-pill badge-frozen">Frozen</span>`;
    const freezeBtn = u.frozen
      ? `<button class="uc-btn uc-unfreeze" onclick="toggleFreeze('${u.username}')">Unfreeze</button>`
      : `<button class="uc-btn uc-freeze" onclick="toggleFreeze('${u.username}')">Freeze</button>`;
    return `<div class="user-card ${u.frozen?'frozen-card':''}" id="uc-${u.username}">
      <div class="uc-top">
        <div class="uc-photo-wrap">
          <div class="uc-photo">${photoHtml}</div>
          ${online?'<div class="online-dot" title="Online now"></div>':''}
        </div>
        <div class="uc-name">${u.name}</div>
        <div class="uc-username">@${u.username}</div>
        <div class="uc-badges">${badges}</div>
        ${u.school?`<div class="uc-school">${u.school}</div>`:''}
      </div>
      <div class="uc-stats">
        <div class="uc-stat"><div class="uc-stat-val" style="color:var(--p)">₹${avg>0?avg.toLocaleString('en-IN'):'—'}</div><div class="uc-stat-lbl">Game Avg</div></div>
        <div class="uc-stat"><div class="uc-stat-val" style="color:var(--t)">₹${realVal.toLocaleString('en-IN')}</div><div class="uc-stat-lbl">Real Portfolio</div></div>
      </div>
      <div class="uc-rank">Rank: <strong>#${avg>0?rankMap[u.username]:'—'}</strong> &nbsp;·&nbsp; ${u.gameHistory?.length||0} game(s)</div>
      <div class="uc-actions">
        <button class="uc-btn uc-details" onclick="showDetails('${u.username}')">Details</button>
        ${freezeBtn}
        <button class="uc-btn uc-delete" onclick="deleteUser('${u.username}')">Delete</button>
      </div>
    </div>`;
  }).join('');
  renderStats();
}

function showDetails(username) {
  const users = getUsers();
  const u = users[username];
  if (!u) return;
  const avg = u.gameHistory && u.gameHistory.length > 0 ? Math.round(u.gameHistory.reduce((a,b)=>a+b,0)/u.gameHistory.length) : 0;
  document.getElementById('modalTitle').textContent = u.name;
  document.getElementById('modalBody').innerHTML = [
    {l:'Username',v:'@'+u.username},
    {l:'Password',v:atob(u.passHash||'')},
    {l:'Email',v:u.email||'—'},
    {l:'Type',v:u.type.charAt(0).toUpperCase()+u.type.slice(1)},
    {l:'School',v:u.school||'—'},
    {l:'Level',v:u.level==='school'?'School Programme':u.level==='amateur'?'Self-Learner':u.type==='teacher'?'Teacher':'—'},
    {l:'Game Sessions',v:u.gameHistory?.length||0},
    {l:'Game Avg',v:avg>0?'₹'+avg.toLocaleString('en-IN'):'No games yet'},
    {l:'Real Portfolio',v:'₹'+(u.realPortfolioValue||50000).toLocaleString('en-IN')},
    {l:'Status',v:u.frozen?'Frozen':'Active'},
    {l:'Online',v:Date.now()-(u.lastActive||0)<120000?'Yes (active now)':'Last seen '+(u.lastActive?new Date(u.lastActive).toLocaleString('en-IN'):'never')},
    {l:'Joined',v:u.createdAt?new Date(u.createdAt).toLocaleDateString('en-IN'):'—'},
  ].map(r=>`<div class="detail-row"><span class="detail-label">${r.l}</span><span class="detail-val">${r.v}</span></div>`).join('');
  document.getElementById('detailModal').classList.add('show');
}

function toggleFreeze(username) {
  const users = getUsers();
  if (!users[username]) return;
  users[username].frozen = !users[username].frozen;
  saveUsers(users);
  renderUsers();
  buildSchoolTabs();
}

function deleteUser(username) {
  if (!confirm(`Delete account @${username}? This cannot be undone.`)) return;
  const users = getUsers();
  delete users[username];
  saveUsers(users);
  renderUsers();
  buildSchoolTabs();
}

// Auto-refresh stats
setInterval(renderStats, 10000);
</script>
</body>
</html>
